version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: tradingbotagent-postgres
    environment:
      POSTGRES_DB: tradingbotagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradingbot-network

  redis:
    image: redis:7-alpine
    container_name: tradingbotagent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradingbot-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: tradingbotagent-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/tradingbotagent
      - REDIS_URL=redis://redis:6379/0
    networks:
      - tradingbot-network
    command: python -m uvicorn src.backend.main:app --host 0.0.0.0 --port 8000 --reload

  telegram_bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.telegram
    container_name: tradingbotagent-telegram
    env_file: .env
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - tradingbot-network
    command: python -m src.telegram_bot.main

volumes:
  postgres_data:

networks:
  tradingbot-network:
    driver: bridge
